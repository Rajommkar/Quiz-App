{% extends "base.html" %}
{% block title %}Register | {{ brand_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="auth-card">
            <span class="eyebrow">Create your account</span>
            <h1 class="h2 mb-3">Start your PG prep workspace</h1>
            <form method="post" class="row g-3">
                <div class="col-12"><label class="form-label">Name</label><input type="text" name="name" class="form-control form-control-lg" required></div>
                <div class="col-12"><label class="form-label">Email</label><input type="email" name="email" class="form-control form-control-lg" required></div>
                <div class="col-12"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control form-control-lg"></div>
                <div class="col-12"><label class="form-label">Password</label><input type="password" name="password" class="form-control form-control-lg" required></div>
                <div class="col-12 d-grid"><button type="submit" class="btn btn-primary btn-lg">Create account</button></div>
            </form>
            <p class="mt-3 mb-0 text-muted">Already have an account? <a href="{{ url_for('main.login') }}">Login here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
